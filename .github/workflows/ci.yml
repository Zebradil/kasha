name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      # Runs shellcheck, actionlint, the fixture tests, and the box
      # seed->serve->substitute->verify smoke test (NixOS VM).
      - run: nix flake check -L
